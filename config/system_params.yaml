# ═══════════════════════════════════════════════════════
# GPS-Denied Border Surveillance — System Parameters
# Application: Outdoor suburban/cross-border operations
# ═══════════════════════════════════════════════════════

# === Perception Parameters ===
perception:
  forward_camera_topic: "/camera/forward/image_raw"
  downward_camera_topic: "/camera/downward/image_raw"
  thermal_camera_topic: "/camera/thermal/image_raw"
  depth_topic: "/camera/depth/image_raw"
  max_features: 800             # More features for outdoor textures
  scale_factor: 1.2
  n_levels: 8
  max_depth_range: 30.0         # Outdoor: 30m depth range
  voxel_size: 0.5               # Coarser voxels for large-area mapping
  terrain_resolution: 1.0       # 1m terrain grid

# === State Estimation Parameters ===
state_estimation:
  vio_algorithm: "orb_klt_imu"
  feature_threshold: 20         # Lower threshold — more features outdoors
  confidence_threshold: 0.3
  imu_rate: 200
  keyframe_interval: 1.0        # Longer keyframe interval for outdoor
  max_covariance_position: 5.0  # Larger tolerance outdoors
  relocalization_timeout: 10.0  # More time to recover at long range

  # GPS spoofing/jamming detection
  gps_spoof_detection: true
  gps_position_jump_thresh: 50.0   # >50m jump = spoofing
  gps_velocity_mismatch_thresh: 10.0  # VIO vs GPS velocity difference
  gnss_cn0_threshold: 25.0        # Signal strength floor (dB-Hz)

  # Terrain-aided navigation
  terrain_matching_enabled: true
  terrain_match_interval: 5.0     # Match every 5 seconds
  terrain_db_path: "/workspace/terrain/sector_alpha.tif"

  # INS dead reckoning
  ins_drift_rate: 0.01            # 1% drift per km (fallback)
  barometer_enabled: true
  magnetometer_enabled: true

# === Mapping Parameters ===
mapping:
  resolution: 1.0               # 1m resolution for outdoor
  local_map_radius: 200.0       # 200m local map
  insertion_max_range: 30.0
  obstacle_inflation: 2.0       # 2m inflation for outdoor safety
  occupancy_threshold: 0.7
  free_threshold: 0.3
  map_stale_timeout: 30.0       # Maps persist longer outdoors

  # Terrain elevation
  terrain_follow_enabled: true
  terrain_lookahead_m: 100.0    # Look 100m ahead for terrain changes
  min_ground_clearance: 30.0    # Absolute minimum 30m AGL

# === Planning Parameters ===
planning:
  algorithm: "rrt_star"
  planning_horizon: 500.0       # Plan 500m ahead
  replan_rate: 1.0              # Replan every 1s (outdoor — slower)
  goal_tolerance: 15.0          # 15m tolerance for outdoor waypoints
  max_velocity: 15.0            # 15 m/s max
  cruise_velocity: 8.0          # 8 m/s cruise
  surveillance_velocity: 5.0    # 5 m/s during sweeps
  max_acceleration: 3.0
  max_yaw_rate: 0.5             # Slower yaw for stable camera
  safety_margin: 5.0            # 5m obstacle margin
  stuck_timeout: 30.0
  max_planning_time: 0.5
  smoothing: "minimum_snap"

  # Loiter parameters
  loiter_radius: 50.0           # 50m orbit radius
  loiter_speed: 5.0             # 5 m/s during loiter

  # Stealth mode
  stealth_max_altitude: 50.0    # Stay below 50m in stealth
  terrain_mask_enabled: true    # Use terrain to hide from observers

# === Control Parameters ===
control:
  control_rate: 50
  offboard_heartbeat_rate: 10
  position_tracking_kp: 0.8     # Softer gains for outdoor (less aggressive)
  velocity_ff_gain: 0.9
  max_tracking_error: 10.0      # 10m tracking error limit
  trajectory_blend_time: 1.0
  arm_timeout: 10.0

  # Terrain following
  terrain_follow_kp: 0.5
  altitude_hold_band: 5.0       # ±5m altitude band

# === Safety Parameters ===
safety:
  vio_confidence_warn: 0.3
  vio_confidence_critical: 0.1
  vio_recovery_timeout: 15.0    # 15s recovery window (longer for outdoor)
  battery_warn_pct: 30.0        # Higher margin for outdoor
  battery_critical_pct: 20.0    # Must have reserve to RTL
  heartbeat_timeout: 3.0        # 3s heartbeat (outdoor latency)
  max_tracking_error: 15.0
  land_descent_rate: 1.0        # 1 m/s descent rate

  # Corridor geofence (NED from launch)
  geofence_north_min: -500.0
  geofence_north_max: 5000.0
  geofence_east_min: -2000.0
  geofence_east_max: 2000.0
  geofence_alt_max: 120.0
  geofence_alt_min: 30.0        # Floor — don't fly below 30m AGL

  # GPS spoofing response
  gps_spoof_action: "ignore_gps"  # Ignore GPS, rely on VIO
  gps_jam_action: "continue_vio"  # Continue on VIO-only nav

  # Communication
  comms_loss_timeout: 30.0       # 30s comms loss → RTL
  comms_loss_action: "rtl"       # Return to launch on comms loss

  # Emergency landing
  emergency_landing_sites_file: "/workspace/missions/border_patrol.yaml"
  emergency_descent_rate: 2.0    # Faster descent in emergency

# === Surveillance Parameters ===
surveillance:
  target_detection_enabled: true
  detection_model: "yolov8n"     # Lightweight detection model
  detection_classes:
    - "person"
    - "vehicle"
    - "structure"
  detection_confidence_min: 0.5
  recording_enabled: true
  recording_path: "/workspace/recordings"
  geotag_detections: true
  alert_on_detection: true
  thermal_enabled: true
  thermal_detection_range: 200.0
